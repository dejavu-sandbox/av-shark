<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AV.SHARK</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <style>
        :root {
            --bg-color: #1a1a24;
            --panel-bg: #252533;
            --primary: #d32f2f; /* Rouge agressif pour l'attaque */
            --primary-hover: #b71c1c;
            --secondary: #4CAF50;
            --secondary-hover: #45a049;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #bg-scatter {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        #bg-scatter img {
            position: absolute;
            opacity: 0.30;
            filter: grayscale(5%);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 960px;
            width: 100%;
        }

        h2 {
            text-align: center;
            color: #fff;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .panel {
            background-color: var(--panel-bg);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            margin-bottom: 25px;
        }

        .panel h3 {
            margin-top: 0;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            color: #fff;
        }

        .panel.distance h3 {
            border-bottom-color: var(--secondary);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: var(--text-muted);
            font-weight: bold;
        }

        .coord-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="number"], input[type="time"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #444;
            background-color: #1e1e28;
            color: #fff;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1.1em;
        }

        .coord-group input {
            width: 50%;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
            text-transform: uppercase;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button.btn-secondary {
            background-color: var(--secondary);
        }
        
        button.btn-secondary:hover {
            background-color: var(--secondary-hover);
        }

        .results {
            margin-top: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #1e1e28;
            border-radius: 5px;
            overflow: hidden;
        }

        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        th {
            background-color: #2a2a36;
            color: var(--primary);
            font-size: 0.9em;
        }

        th.col-25 { color: #FFC107; }
        th.col-50 { color: #FF9800; }
        td.time-25 { color: #fff; font-weight: bold; font-size: 1.1em; text-shadow: 0 0 5px rgba(255,193,7,0.6); }
        td.time-50 { color: #fff; font-weight: bold; font-size: 1.1em; text-shadow: 0 0 5px rgba(255,152,0,0.7); }

        tr:hover {
            background-color: #2a2a36;
        }

        .highlight-time {
            color: #fff;
            font-weight: bold;
            font-size: 1.1em;
            text-shadow: 0 0 5px rgba(211, 47, 47, 0.5);
        }
    </style>
</head>
<body>

    <div id="bg-scatter"></div>

    <div class="container">
        <h2>🦈 AV.SHARK</h2>

        <div class="panel">
            <h3>1. Planification de l'Interception</h3>
            
            <div class="form-group">
                <label>Distance jusqu'à l'ennemi (km)</label>
                <input type="number" id="distance" step="0.01" placeholder="Ex: 5.39">
            </div>

            <div class="form-group">
                <label>Heure d'attaque subit (Heure d'impact sur votre village)</label>
                <div class="coord-group">
                    <input type="number" id="hh" min="0" max="23" placeholder="HH" style="text-align:center;" oninput="this.value=Math.min(23,Math.max(0,parseInt(this.value)||0))">
                    <input type="number" id="mm" min="0" max="59" placeholder="MM" style="text-align:center;" oninput="this.value=Math.min(59,Math.max(0,parseInt(this.value)||0))">
                    <input type="number" id="ss" min="0" max="59" placeholder="SS" style="text-align:center;" oninput="this.value=Math.min(59,Math.max(0,parseInt(this.value)||0))">
                </div>
            </div>

            <button onclick="calculerTableauRetour()">🔨 Calculer les heures de poutrage</button>

            <div class="results" id="resultRetour" style="display: none;">
                </div>
        </div>

        <div class="panel distance">
            <h3>2. Trouver la distance</h3>
            
            <div class="form-group">
                <label>Vos coordonnées (X, Y) - Par défaut: 7, -1</label>
                <div class="coord-group">
                    <input type="number" id="x1" placeholder="X">
                    <input type="number" id="y1" placeholder="Y">
                </div>
            </div>

            <div class="form-group">
                <label>Coordonnées Ennemi (X, Y)</label>
                <div class="coord-group">
                    <input type="number" id="x2" placeholder="X">
                    <input type="number" id="y2" placeholder="Y">
                </div>
            </div>

            <button class="btn-secondary" onclick="calculerDistance()">📐 Calculer la distance</button>

            <div class="results" id="resultDistance" style="display: none; padding: 15px; background-color: #1e1e28; border-left: 4px solid var(--secondary); margin-top: 15px;">
                <p style="margin: 0;">Distance trouvée : <strong style="color: var(--secondary);" id="affichageDistance"></strong> km</p>
            </div>
        </div>
    </div>

    <script>
        // Scattered background images
        (function() {
            const container = document.getElementById('bg-scatter');
            const imgUrl = 'img/shark_ssj3.png';
            const count = 18;
            for (let i = 0; i < count; i++) {
                const img = document.createElement('img');
                img.src = imgUrl;
                const size = 200 + Math.random() * 500; // 200px à 700px
                const top  = Math.random() * 110 - 5;   // légèrement hors écran
                const left = Math.random() * 110 - 5;
                const rot  = (Math.random() * 70) - 35; // -35° à +35°
                img.style.cssText = `
                    width: ${size}px;
                    top: ${top}%;
                    left: ${left}%;
                    transform: rotate(${rot}deg);
                `;
                container.appendChild(img);
            }
        })();

        // Fonction pour calculer la distance
        function calculerDistance() {
            const x1 = parseFloat(document.getElementById('x1').value);
            const y1 = parseFloat(document.getElementById('y1').value);
            const x2 = parseFloat(document.getElementById('x2').value);
            const y2 = parseFloat(document.getElementById('y2').value);

            if (isNaN(x1) || isNaN(y1) || isNaN(x2) || isNaN(y2)) {
                alert("Coordonnées incomplètes !");
                return;
            }

            const distance = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
            
            document.getElementById('affichageDistance').innerText = distance.toFixed(3);
            document.getElementById('resultDistance').style.display = 'block';

            // Report automatique en haut
            document.getElementById('distance').value = distance.toFixed(2);
            
            // Fait défiler la page doucement vers le haut
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Fonction pour générer le tableau des retours
        function calculerTableauRetour() {
            const distance = parseFloat(document.getElementById('distance').value);
            const hhVal = document.getElementById('hh').value;
            const mmVal = document.getElementById('mm').value;
            const ssVal = document.getElementById('ss').value;

            if (isNaN(distance) || hhVal === '' || mmVal === '') {
                alert("Il manque la distance ou l'heure de l'attaque !");
                return;
            }

            let heures   = parseInt(hhVal) || 0;
            let minutes  = parseInt(mmVal) || 0;
            let secondes = parseInt(ssVal) || 0;

            // Créer une date de base pour faire les calculs mathématiques
            const dateImpact = new Date();
            dateImpact.setHours(heures, minutes, secondes, 0);

            // Préparation du tableau HTML
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Niveau CE</th>
                            <th>Vitesse</th>
                            <th>Heure de la castagne</th>
                            <th class="col-25">🟡 25 coins (2×)</th>
                            <th class="col-50">🟠 50 coins (2.5×)</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            // Helpers
            function fmtDuree(sec) {
                const h = Math.floor(sec / 3600);
                const m = Math.floor((sec % 3600) / 60);
                const s = sec % 60;
                return `${h > 0 ? h + 'h ' : ''}${m}m ${s}s`;
            }
            function fmtHeure(date) {
                return `${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}:${String(date.getSeconds()).padStart(2,'0')}`;
            }

            // Boucle de calcul pour les niveaux 1 à 20
            for (let niv = 1; niv <= 20; niv++) {
                const vitesse = 240 - (niv * 10);
                
                const trajetSecondes    = Math.round(distance * vitesse);
                const trajetSecondes25  = Math.round(trajetSecondes / 2);
                const trajetSecondes50  = Math.round(trajetSecondes / 2.5);
                
                const dateRetour   = new Date(dateImpact.getTime() + trajetSecondes   * 1000);
                const dateRetour25 = new Date(dateImpact.getTime() + trajetSecondes25 * 1000);
                const dateRetour50 = new Date(dateImpact.getTime() + trajetSecondes50 * 1000);

                const bgStyle = (niv % 5 === 0) ? 'background-color: #2c2c38;' : '';

                html += `
                    <tr style="${bgStyle}">
                        <td><strong>Niv ${niv}</strong></td>
                        <td style="color: #888;">${vitesse}s/km</td>
                        <td class="highlight-time">${fmtHeure(dateRetour)}<div style="font-size:0.72em;color:#888;font-weight:normal;margin-top:2px;">trajet: ${fmtDuree(trajetSecondes)}</div></td>
                        <td class="time-25">${fmtHeure(dateRetour25)}<div style="font-size:0.72em;color:#888;font-weight:normal;margin-top:2px;">trajet: ${fmtDuree(trajetSecondes25)}</div></td>
                        <td class="time-50">${fmtHeure(dateRetour50)}<div style="font-size:0.72em;color:#888;font-weight:normal;margin-top:2px;">trajet: ${fmtDuree(trajetSecondes50)}</div></td>
                    </tr>
                `;
            }

            html += `</tbody></table>`;

            // Afficher le résultat
            const divResultat = document.getElementById('resultRetour');
            divResultat.innerHTML = html;
            divResultat.style.display = 'block';
        }
    </script>
</body>
</html>
